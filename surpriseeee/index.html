<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>3ヶ月記念日 ❤️ 私たちのプロフィール写真 | 記念日スペシャル</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Fredoka+One&family=Yusei+Magic&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
  <style>
    /* ----- CSS CUSTOM PROPERTIES ----- */
    :root {
      --primary-romance: #ff8a7a;
      --primary-soft: #ffb48a;
      --glass-bg: rgba(255, 248, 245, 0.55);
      --glass-border: rgba(255, 245, 235, 0.8);
      --shadow-strong: 0 20px 40px rgba(0, 0, 0, 0.1), 0 0 0 1px rgba(255, 220, 200, 0.3);
      --transition-smooth: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      --profile-glow: 0 0 0 4px rgba(255, 140, 110, 0.4), 0 10px 25px rgba(0, 0, 0, 0.1);
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #ffe8f0 0%, #ffdbdf 100%);
      font-family: 'Quicksand', 'Yusei Magic', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Sakura container */
    .sakura-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
      overflow: hidden;
    }
    .sakura {
      position: absolute;
      color: #ffb7c5;
      font-size: 1.5rem;
      opacity: 0.7;
      animation: fall linear forwards;
      pointer-events: none;
      will-change: transform;
    }
    @keyframes fall {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 0.9; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    /* Main card wrapper (initially hidden) */
    .card-wrapper {
      max-width: 850px;
      width: 100%;
      opacity: 0;
      transform: scale(0.96);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .card-wrapper.revealed {
      opacity: 1;
      transform: scale(1);
      animation: gentlePopIn 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
    }
    @keyframes gentlePopIn {
      0% { opacity: 0; transform: scale(0.94) translateY(18px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Glass card */
    .anniversary-card {
      width: 100%;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 80px 80px 90px 90px;
      box-shadow: var(--shadow-strong);
      padding: 2rem 2rem 2.5rem;
      text-align: center;
      position: relative;
      z-index: 10;
      transition: var(--transition-smooth);
      border: 1px solid rgba(255, 250, 240, 0.7);
      animation: floatGlow 2.5s infinite alternate ease-in-out;
    }
    @keyframes floatGlow {
      0% { transform: translateY(0px); box-shadow: 0 25px 45px rgba(255, 105, 180, 0.2); }
      100% { transform: translateY(-6px); box-shadow: 0 30px 55px rgba(255, 105, 180, 0.3); }
    }

    .cute-sticker {
      position: absolute;
      font-size: 2.4rem;
      filter: drop-shadow(2px 6px 12px rgba(0,0,0,0.15));
      transition: transform 0.2s ease;
      pointer-events: none;
    }
    .sticker-left { top: -20px; left: -20px; transform: rotate(-12deg); }
    .sticker-right { bottom: -25px; right: -20px; transform: rotate(8deg); }
    .cute-sticker:hover { transform: scale(1.05) rotate(0deg); }

    h1 {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2rem, 8vw, 2.9rem);
      background: linear-gradient(135deg, #ff6f91, #ffaa7a);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
    }
    .japanese-sub {
      font-size: clamp(1rem, 4vw, 1.4rem);
      font-weight: 600;
      color: #e3647c;
      background: rgba(255, 240, 235, 0.8);
      backdrop-filter: blur(4px);
      display: inline-block;
      padding: 0.3rem 1.5rem;
      border-radius: 60px;
      margin-bottom: 1rem;
    }

    /* Profile */
    .profile-area {
      background: rgba(255, 242, 237, 0.7);
      backdrop-filter: blur(4px);
      border-radius: 70px;
      padding: 1.8rem 1rem;
      margin: 1rem 0 1rem;
      box-shadow: 0 15px 25px rgba(255, 140, 110, 0.15);
      border: 1px solid #ffffffaa;
    }
    .profile-container {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 1.2rem;
    }
    .profile-card {
      text-align: center;
      flex: 1;
      min-width: 120px;
    }
    .profile-frame {
      width: min(160px, 35vw);
      height: min(160px, 35vw);
      margin: 0 auto;
      background: #fff2ec;
      border-radius: 50%;
      border: 4px solid #ffcfbc;
      box-shadow: 0 12px 20px rgba(0,0,0,0.08);
      overflow: hidden;
      transition: var(--transition-smooth);
      cursor: pointer;
    }
    .profile-frame:hover {
      transform: scale(1.02);
      box-shadow: var(--profile-glow);
      border-color: #ff9f7c;
    }
    .profile-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }
    .profile-name {
      margin-top: 12px;
      font-weight: 700;
      color: #c25a6e;
      background: rgba(255, 241, 234, 0.9);
      backdrop-filter: blur(4px);
      display: inline-block;
      padding: 5px 20px;
      border-radius: 40px;
      font-size: clamp(0.7rem, 3vw, 0.9rem);
    }
    .heart-divider {
      font-size: clamp(2rem, 8vw, 3rem);
      color: #ff8095;
      text-shadow: 0 2px 8px #ffb7c2;
      margin: 0 0.5rem;
      animation: gentlePulse 1.8s infinite;
    }
    @keyframes gentlePulse {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.1); opacity: 1; }
    }

    /* Stats row */
    .stats-row {
      display: flex;
      justify-content: center;
      gap: clamp(0.8rem, 4vw, 1.6rem);
      flex-wrap: wrap;
      margin: 1rem 0;
    }
    .stat-item {
      background: rgba(255, 236, 225, 0.8);
      backdrop-filter: blur(4px);
      border-radius: 70px;
      padding: 0.6rem 1.2rem;
      min-width: 100px;
      transition: var(--transition-smooth);
      border: 1px solid #ffe2d0;
      cursor: pointer;
      touch-action: manipulation;
    }
    .stat-item:hover {
      transform: translateY(-4px);
      background: rgba(255, 245, 235, 0.95);
      box-shadow: 0 10px 18px rgba(255, 120, 100, 0.2);
    }
    .stat-item i {
      font-size: clamp(1.4rem, 5vw, 1.9rem);
      color: #ff8a7a;
      display: block;
    }
    .stat-number {
      font-size: clamp(1.2rem, 5vw, 1.7rem);
      font-weight: 800;
      color: #f25e7e;
    }
    .stat-label {
      font-size: clamp(0.7rem, 3vw, 0.8rem);
      font-weight: 600;
      color: #b55c6e;
    }

    /* Love letter box */
    .love-message-box {
      background: rgba(255, 245, 240, 0.85);
      backdrop-filter: blur(6px);
      border-radius: 55px;
      padding: 1.5rem;
      margin: 1rem 0;
      border: 2px solid rgba(255, 192, 170, 0.6);
    }
    .love-text {
      font-size: clamp(1rem, 4vw, 1.2rem);
      font-weight: 600;
      margin-bottom: 1rem;
      color: #e6687e;
    }
    .surprise-btn {
      background: linear-gradient(135deg, #ffb48a, #ff9a6e);
      border: none;
      font-family: 'Quicksand', sans-serif;
      font-weight: bold;
      padding: 14px 28px;
      min-height: 48px;
      border-radius: 60px;
      font-size: clamp(0.9rem, 4vw, 1rem);
      color: white;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: all 0.2s ease;
      box-shadow: 0 6px 0 #b35f3e;
      touch-action: manipulation;
    }
    .surprise-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 9px 0 #b35f3e;
      background: linear-gradient(135deg, #ffc29c, #ffaa7a);
      gap: 14px;
    }
    .surprise-btn:active {
      transform: translateY(3px);
      box-shadow: 0 3px 0 #b35f3e;
    }
    .random-msg {
      margin-top: 1rem;
      background: white;
      border-radius: 48px;
      padding: 1rem 1.2rem;
      font-weight: 500;
      color: #c9516e;
      border-left: 8px solid #ff9f7c;
      transition: all 0.2s;
      font-size: clamp(0.85rem, 3.5vw, 0.95rem);
      line-height: 1.4;
      text-align: left;
      word-break: break-word;
      min-height: 90px;
    }
    .typing-cursor::after {
      content: "|";
      animation: blink 0.9s step-end infinite;
      margin-left: 2px;
      font-weight: 400;
      color: #ff8a7a;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .footer-note {
      margin-top: 2rem;
      font-size: clamp(0.7rem, 3vw, 0.85rem);
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      color: #e691a3;
      border-top: 2px solid #ffe2d4;
      padding-top: 1.2rem;
    }

    /* Music toggle button */
    .music-toggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(255, 225, 215, 0.85);
      backdrop-filter: blur(8px);
      border-radius: 50%;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 99;
      box-shadow: 0 8px 18px rgba(0,0,0,0.1);
      transition: all 0.2s ease;
      border: 1px solid #fff2e6;
      font-size: 1.5rem;
      color: #e26b7e;
      opacity: 0;
      pointer-events: none;
      touch-action: manipulation;
    }
    .music-toggle.visible {
      opacity: 1;
      pointer-events: auto;
    }
    .music-toggle:hover {
      transform: scale(1.07);
      background: #ffdad0;
      color: #c64b62;
    }

    /* ----- ENTRY OVERLAY (Tap anywhere) ----- */
    .entry-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, #ffe0e8 0%, #ffd0d8 100%);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-family: 'Quicksand', 'Yusei Magic', sans-serif;
      touch-action: manipulation;
      /* Smooth fade in on initial load */
      animation: overlayFadeIn 0.8s ease-out forwards;
      transition: opacity 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1), visibility 0s linear 0s;
    }
    @keyframes overlayFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .entry-overlay.hide {
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.5s ease, visibility 0s linear 0.5s;
    }
    .overlay-content {
      text-align: center;
      padding: 2rem;
      background: rgba(255, 248, 245, 0.85);
      backdrop-filter: blur(8px);
      border-radius: 80px;
      box-shadow: 0 30px 50px rgba(255, 100, 120, 0.25);
      max-width: 85vw;
      width: 380px;
      animation: softFloat 2s infinite alternate ease-in-out;
    }
    @keyframes softFloat {
      0% { transform: translateY(0px); }
      100% { transform: translateY(-8px); }
    }
    .overlay-content i {
      font-size: clamp(3rem, 12vw, 4.5rem);
      color: #ff6f91;
      filter: drop-shadow(0 6px 12px rgba(255,80,100,0.3));
      margin-bottom: 1rem;
      display: inline-block;
      animation: heartbeat 1.4s infinite;
    }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }
    .overlay-content h2 {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.6rem, 7vw, 2rem);
      background: linear-gradient(135deg, #ff6f91, #ffaa7a);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 0.75rem;
    }
    .overlay-content p {
      font-size: clamp(1rem, 4.5vw, 1.3rem);
      font-weight: 600;
      color: #e6687e;
      margin: 0.5rem 0;
    }
    .overlay-content .sub {
      font-size: clamp(0.85rem, 3.5vw, 1rem);
      font-weight: 500;
      color: #b85f7a;
      margin-top: 0.5rem;
    }
    .tap-hint {
      margin-top: 1.5rem;
      background: rgba(255, 225, 215, 0.9);
      display: inline-block;
      padding: 0.5rem 1.2rem;
      border-radius: 50px;
      font-weight: 600;
      color: #c5516b;
      font-size: clamp(0.8rem, 3.5vw, 0.9rem);
      backdrop-filter: blur(4px);
      pointer-events: none;
    }

    /* Mobile specific improvements */
    @media (max-width: 650px) {
      body { padding: 1rem; }
      .anniversary-card { padding: 1.5rem 1.2rem 2rem; border-radius: 50px; }
      .profile-area { padding: 1.2rem 0.8rem; }
      .profile-container { gap: 0.8rem; }
      .profile-frame { width: min(120px, 32vw); height: min(120px, 32vw); }
      .stat-item { padding: 0.4rem 1rem; min-width: 80px; }
      .love-message-box { padding: 1.2rem; }
      .music-toggle { width: 44px; height: 44px; font-size: 1.3rem; bottom: 16px; right: 16px; }
    }
    @media (max-width: 480px) {
      .profile-container { gap: 0.5rem; }
      .profile-frame { width: 100px; height: 100px; }
      .heart-divider { margin: 0 0.2rem; }
      .stats-row { gap: 0.6rem; }
      .stat-item { min-width: 70px; padding: 0.3rem 0.8rem; }
      .footer-note { gap: 8px; }
    }
  </style>
</head>
<body>

<div class="entry-overlay" id="entryOverlay">
  <div class="overlay-content">
    <i class="fas fa-heart"></i>
    <h2>✨ 特別なサプライズ ✨</h2>
    <p>Tap anywhere to enter 💗</p>
    <div class="sub">A little surprise for you...</div>
    <div class="tap-hint">
      <i class="fas fa-hand-pointer"></i> タップして始める
    </div>
  </div>
</div>

<div class="sakura-container" id="sakuraContainer"></div>

<audio id="bgMusic" loop preload="auto">
  <source src="https://github.com/mintiil/mintiil.github.io/raw/refs/heads/main/surpriseeee/Smyang%20Piano%20-%20rm%20-%20%20tokyo%20lofi%20ver..m4a" type="audio/mpeg">
</audio>
<div class="music-toggle" id="musicToggleBtn">
  <i class="fas fa-music"></i>
</div>

<div class="card-wrapper" id="cardWrapper">
  <div class="anniversary-card">
    <div class="cute-sticker sticker-left">🐻‍❄️✨🎀</div>
    <div class="cute-sticker sticker-right">🌸💖🐱</div>

    <h1>❤️ 3 Months Together ❤️</h1>
    <div class="japanese-sub">三ヶ月記念日おめでとう！</div>

    <div class="profile-area">
      <div class="profile-container">
        <div class="profile-card">
          <div class="profile-frame">
            <img id="profileImgLeft" src="https://files.catbox.moe/vgo2gr.png" alt="your profile">
          </div>
          <div class="profile-name">
            <i class="fas fa-heart"></i> あなた <i class="fas fa-heart"></i>
          </div>
        </div>
        <div class="heart-divider">
          <i class="fas fa-heart heart-float"></i>
        </div>
        <div class="profile-card">
          <div class="profile-frame">
            <img id="profileImgRight" src="https://files.catbox.moe/6gnk6q.png" alt="boyfriend profile">
          </div>
          <div class="profile-name">
            <i class="fas fa-star"></i> 彼氏くん <i class="fas fa-star"></i>
          </div>
        </div>
      </div>
      <p style="font-size:0.7rem; margin-top:12px; color:#b9836b;">
        💕 ふたりの写真をURLで設定してね 💕
      </p>
    </div>

    <div class="stats-row">
      <div class="stat-item"><i class="fas fa-smile-beam"></i><div class="stat-number">✨90✨</div><div class="stat-label">Days of Smiles</div></div>
      <div class="stat-item"><i class="fas fa-calendar-alt"></i><div class="stat-number" id="daysCounter">--</div><div class="stat-label">Days Together</div></div>
      <div class="stat-item"><i class="fas fa-heart"></i><div class="stat-number">💕∞💕</div><div class="stat-label">Endless Love</div></div>
    </div>

    <div class="love-message-box">
      <div class="love-text"><i class="fas fa-heart heart-float"></i> 大好きだよ、my darling <i class="fas fa-heart heart-float"></i></div>
      <button class="surprise-btn" id="surpriseMsgBtn"><i class="fas fa-envelope-open-text"></i> ラブレターを開く</button>
      <div id="randomMessageDisplay" class="random-msg">✨ ボタンを押すと、スペシャルメッセージが届くよ ✨</div>
    </div>

    <div class="footer-note">
      <span><i class="fas fa-crown"></i> 君と出会えて、毎日が宝物</span>
      <span><i class="fas fa-cat"></i> これからもよろしくね！</span>
      <span><i class="fas fa-moon"></i> 3ヶ月もっと好きになったよ</span>
    </div>
  </div>
</div>

<script>
  (function() {
    // Detect mobile for performance tweaking
    const isMobile = window.innerWidth <= 650;

    // ----- HELPER: create sakura petals -----
    let sakuraCreated = false;
    function createSakura() {
      if (sakuraCreated) return;
      sakuraCreated = true;
      const sakuraContainer = document.getElementById('sakuraContainer');
      if (!sakuraContainer) return;
      const flowers = ['🌸', '🌼', '🌸', '🌸', '💮', '🌸', '🌺', '🌸'];
      const sakuraCount = isMobile ? 12 : 26;
      for (let i = 0; i < sakuraCount; i++) {
        let petal = document.createElement('div');
        petal.classList.add('sakura');
        petal.innerHTML = flowers[Math.floor(Math.random() * flowers.length)];
        petal.style.fontSize = (Math.floor(Math.random() * 20 + 18)) + 'px';
        petal.style.left = Math.random() * 100 + '%';
        petal.style.animationDuration = (Math.random() * 8 + 5) + 's';
        petal.style.animationDelay = Math.random() * 10 + 's';
        sakuraContainer.appendChild(petal);
      }
    }

    // ----- DAY COUNTER -----
    function updateDayCounter() {
      const startDate = new Date(2025, 11, 27);
      const today = new Date();
      startDate.setHours(0, 0, 0, 0);
      today.setHours(0, 0, 0, 0);
      const diffDays = Math.floor((today - startDate) / (1000 * 60 * 60 * 24));
      const counter = document.getElementById('daysCounter');
      if (counter) counter.textContent = diffDays >= 0 ? `❤️ ${diffDays} ❤️` : `✨ 0 ✨`;
    }
    updateDayCounter();
    setInterval(updateDayCounter, 60000);

    // ----- ROMANTIC MESSAGES -----
    const loveMessages = [
      "💌 君と出会ってから、毎日が特別です。3ヶ月も一緒にいられて幸せ！これからもずっと一緒にいてね。💕",
      "🌸 大好きだよ、だいすきなあなた！あなたの笑顔が私の宝物です。3ヶ月記念日おめでとう。🌸",
      "🐱 3ヶ月という時間、あっという間だったね。でもその全部が素敵な思い出。大好き、これからもよろしく！",
      "🎀 あなたは私の太陽です。いつも明るくしてくれてありがとう。3ヶ月、もっともっと好きになったよ！🎀",
      "💖 日本語で言うと『あなたのことが大好きです』。これからもよろしくね、彼氏さん！💖",
      "🍡 3ヶ月間、一緒に笑って、おいしいもの食べて…全てがキラキラしてる。ありがとう、大好き！",
      "🌟 君は私のヒーロー。これからも二人で素敵な思い出を作ろうね。3ヶ月おめでとう！🌟",
      "🎉 三ヶ月も経ったなんて信じられない！もっともっと長く一緒にいようね。大好きだよ！🎉",
      "🐻‍❄️ あなたは私のぬいぐるみみたいに温かくて、一緒にいると安心するよ。大好き、3ヶ月記念日❤️",
      "✨ 毎日あなたに恋をしています。3ヶ月、本当にありがとう。これからもずっとあなたのそばにいるよ✨",
      "🌙 夜空の星よりも輝くあなたへ。三ヶ月記念日、これからも手をつないで歩こうね。大好き！",
      "💎 あなたと一緒にいるときが一番幸せ。3ヶ月、もっともっと深く愛してる。これからもよろしく💎"
    ];

    // Typing animation
    let typingInterval = null;
    const msgDisplay = document.getElementById('randomMessageDisplay');
    function stopTyping() {
      if (typingInterval) clearInterval(typingInterval);
      if (msgDisplay) msgDisplay.classList.remove('typing-cursor');
    }
    function typeMessage(text, target) {
      stopTyping();
      target.innerHTML = "";
      target.classList.add('typing-cursor');
      let idx = 0;
      typingInterval = setInterval(() => {
        if (idx < text.length) {
          target.innerHTML += text.charAt(idx);
          idx++;
          target.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        } else {
          clearInterval(typingInterval);
          typingInterval = null;
          target.classList.remove('typing-cursor');
        }
      }, 45);
    }

    function burstConfetti() {
      if (typeof canvasConfetti !== 'undefined') {
        canvasConfetti({ particleCount: 150, spread: 80, origin: { y: 0.6 }, startVelocity: 18, colors: ['#ff9a7c', '#ff6f91', '#ffb7c5', '#ffd966'] });
        canvasConfetti({ particleCount: 60, spread: 50, origin: { y: 0.7, x: 0.3 }, startVelocity: 12 });
        canvasConfetti({ particleCount: 60, spread: 50, origin: { y: 0.7, x: 0.7 }, startVelocity: 12 });
        setTimeout(() => canvasConfetti({ particleCount: 80, spread: 40, origin: { y: 0.5 }, startVelocity: 8 }), 100);
      }
    }

    // Surprise button inside card
    const surpriseBtn = document.getElementById('surpriseMsgBtn');
    if (surpriseBtn) {
      surpriseBtn.addEventListener('click', (e) => {
        e.preventDefault();
        burstConfetti();
        const randomMsg = loveMessages[Math.floor(Math.random() * loveMessages.length)];
        if (msgDisplay) typeMessage(randomMsg, msgDisplay);
        surpriseBtn.style.transform = "scale(0.97)";
        setTimeout(() => { surpriseBtn.style.transform = ""; }, 120);
      });
    }

    // Floating hearts
    let heartInterval = null;
    function startFloatingHearts() {
      if (heartInterval) return;
      const heartChance = isMobile ? 0.85 : 0.7;
      const heartIntervalTime = isMobile ? 3200 : 2200;
      
      heartInterval = setInterval(() => {
        if (Math.random() > heartChance) {
          const heart = document.createElement('div');
          heart.innerHTML = '❤️';
          heart.style.position = 'fixed';
          heart.style.left = Math.random() * window.innerWidth + 'px';
          heart.style.bottom = '-20px';
          heart.style.fontSize = Math.random() * 20 + 12 + 'px';
          heart.style.opacity = 0.8;
          heart.style.pointerEvents = 'none';
          heart.style.zIndex = 999;
          heart.style.transition = 'transform 3.2s ease-out, opacity 3s ease-out';
          heart.style.filter = 'drop-shadow(0 2px 5px rgba(255,80,100,0.3))';
          document.body.appendChild(heart);
          requestAnimationFrame(() => {
            heart.style.transform = 'translateY(-92vh) rotate(15deg)';
            heart.style.opacity = '0';
          });
          setTimeout(() => heart.remove(), 3200);
        }
      }, heartIntervalTime);
    }

    // ----- MUSIC HANDLING & ENTRY OVERLAY -----
    const bgAudio = document.getElementById('bgMusic');
    const musicBtn = document.getElementById('musicToggleBtn');
    const overlay = document.getElementById('entryOverlay');
    const cardWrapper = document.getElementById('cardWrapper');
    let musicPlaying = false;
    let overlayTriggered = false;

    function updateMusicUI(playing) {
      if (!musicBtn) return;
      if (playing) {
        musicBtn.innerHTML = '<i class="fas fa-pause"></i>';
        musicBtn.style.background = "#ffccc0";
      } else {
        musicBtn.innerHTML = '<i class="fas fa-music"></i>';
        musicBtn.style.background = "rgba(255,225,215,0.85)";
      }
    }

    // The tap handler
    if (overlay && cardWrapper) {
      overlay.addEventListener('click', (e) => {
        if (overlayTriggered) return;
        overlayTriggered = true;

        // 1. START MUSIC IMMEDIATELY on click to satisfy browser security
        if (bgAudio) {
          bgAudio.volume = 0.35;
          let playPromise = bgAudio.play();
          if (playPromise !== undefined) {
            playPromise.then(() => {
              musicPlaying = true;
              updateMusicUI(true);
            }).catch((error) => {
              console.warn("Autoplay was prevented:", error);
            });
          }
        }

        // 2. Hide and remove overlay smoothly
        overlay.classList.add('hide');
        setTimeout(() => {
          if (overlay.parentNode) {
            overlay.parentNode.removeChild(overlay);
          }
        }, 600);

        // 3. Reveal content and start animations
        cardWrapper.classList.add('revealed');
        burstConfetti();
        createSakura();
        startFloatingHearts();
        if (musicBtn) musicBtn.classList.add('visible');
        setTimeout(() => burstConfetti(), 400);
      });
    }

    // Toggle music from the floating button
    if (musicBtn && bgAudio) {
      musicBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!musicPlaying) {
          bgAudio.volume = 0.35;
          bgAudio.play().then(() => {
            musicPlaying = true;
            updateMusicUI(true);
          });
        } else {
          bgAudio.pause();
          musicPlaying = false;
          updateMusicUI(false);
        }
      });
    }

    // Stat item confetti
    document.querySelectorAll('.stat-item, .profile-frame').forEach(el => {
      el.addEventListener('click', () => {
        if (typeof canvasConfetti !== 'undefined') {
          canvasConfetti({ particleCount: 20, spread: 30, origin: { y: 0.8 }, startVelocity: 6 });
        }
      });
    });

  })();
</script>
</body>
</html>
